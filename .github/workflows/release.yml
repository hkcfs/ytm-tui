name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static binary
        env:
          TARGET_TRIPLE: linux/amd64
        run: |
          chmod +x ./build-static-bin.sh
          ./build-static-bin.sh

      - name: Upload artifact for debugging
        uses: actions/upload-artifact@v4
        with:
          name: ytm-release-assets
          path: |
            dist/*.tar.gz
            dist/*.sha256

      - name: Set release metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
            echo "release_name=Release $TAG" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            TAG="beta-${GITHUB_RUN_ID}"
            echo "tag_name=$TAG" >> "$GITHUB_OUTPUT"
            echo "release_name=Beta build #${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          tag_name: ${{ steps.meta.outputs.tag_name }}
          name: ${{ steps.meta.outputs.release_name }}
          draft: false
          prerelease: ${{ steps.meta.outputs.prerelease }}
